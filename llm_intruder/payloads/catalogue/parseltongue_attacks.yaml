name: parseltongue_attacks
description: >
  Advanced obfuscation and encoding attacks inspired by the P4RS3LT0NGV3
  (Parseltongue) research toolkit by elder-plinius. These payloads exploit
  Unicode properties, visual deception, in-context alphabet learning, glitch
  tokens, and anti-classifier semantic rewrites to bypass LLM safety layers.

  Techniques covered:
    - Homoglyph substitution (Cyrillic/Greek lookalikes)
    - Zalgo/diacritic chaos (regex destruction)
    - Unicode Tags block (invisible payload injection)
    - ROT-47 (all-printable ASCII rotation)
    - Vigenère polyalphabetic cipher
    - Rail Fence transposition cipher
    - Binary encoding
    - Bijection / custom alphabet teaching
    - Anti-classifier semantic substitution
    - Glitch token injection (attention sinks, repetition break)
    - Steganographic payload embedding
    - Multi-layer combined attacks

  References: P4RS3LT0NGV3 (elder-plinius 2024), SolidGoldMagikarp
  (Rumbelow & Watkins 2023), Glitch Tokens (Landwehr et al. 2023).
strategy: parseltongue_attacks
tags:
  - parseltongue
  - unicode
  - homoglyph
  - zalgo
  - glitch_tokens
  - bijection
  - anti_classifier
  - obfuscation
  - LLM01
severity: high

payloads:

